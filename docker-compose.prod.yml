name: photo-video

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: photo-video-app
    container_name: photo_video_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
    networks:
      - photo_video_net

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
      args:
        APP_IMAGE: photo-video-app
    container_name: photo_video_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      - app
    networks:
      - photo_video_net

  db:
    image: postgres:16-alpine
    container_name: photo_video_db
    restart: unless-stopped
    profiles:
      - local-db
    environment:
      POSTGRES_DB: ${DB_DATABASE:-photo_video}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-photo_video}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - photo_video_net

volumes:
  pgdata:

networks:
  photo_video_net:
    driver: bridge
