name: photo-video

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: photo_video_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./storage:/var/www/storage
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-false}
    networks:
      - photo_video_net

  nginx:
    image: nginx:stable-alpine
    container_name: photo_video_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - photo_video_net

  db:
    image: postgres:16-alpine
    container_name: photo_video_db
    restart: unless-stopped
    profiles:
      - local-db
    ports:
      - "${DB_PUBLISH_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-photo_video}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-photo_video}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - photo_video_net

  node:
    image: node:20-alpine
    container_name: photo_video_node
    profiles:
      - dev
    working_dir: /var/www
    volumes:
      - .:/var/www
    ports:
      - "5173:5173"
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    networks:
      - photo_video_net

volumes:
  pgdata:

networks:
  photo_video_net:
    driver: bridge
